name: 구조신호 알림 (수동 테스트 전용)

# ⚠️ 예약 발송의 주 스케줄러는 Azure Logic Apps 로 이전됨
#    (rescue-alert-morning 09:00 KST / rescue-alert-evening 18:00 KST → /api/cron).
# GitHub Actions cron 은 정시성·slot 오판 문제로 제거했고, 이 워크플로는
# Actions 탭에서 수동으로 한 번 쏴보는 테스트 용도로만 남겨둔다.
on:
  workflow_dispatch:        # 수동 실행 버튼(테스트용)
    inputs:
      slot:
        description: "발송 슬롯 (morning/evening)"
        required: false
        default: "morning"

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      # 수동 실행 전용 — 입력한 slot(기본 morning)을 그대로 사용한다.
      - name: 슬롯 결정 (수동 입력)
        id: slot
        env:
          INPUT_SLOT: ${{ github.event.inputs.slot }}
        run: |
          VALUE="${INPUT_SLOT:-morning}"
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"
          echo "slot=$VALUE (manual)"

      - name: /api/cron 호출
        run: |
          SLOT="${{ steps.slot.outputs.value }}"
          echo "발송 슬롯: $SLOT"
          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "${{ secrets.CRON_URL }}/api/cron?slot=$SLOT" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "HTTP $HTTP"
          cat /tmp/resp.json
          if [ "$HTTP" != "200" ]; then
            echo "::error::알림 발송 실패 (HTTP $HTTP)"
            exit 1
          fi
